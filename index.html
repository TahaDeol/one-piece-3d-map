<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece 3D Map</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <link rel="stylesheet" href="src/map.css">

</head>
<body>

    <div id="loadingScreen" style="display: none;">

        <svg class="sea-route" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100 200 Q 300 150 600 250 T 1200 200 T 1600 220"
                stroke="#3b1f0a" stroke-width="2" fill="none" stroke-dasharray="10,8"/>
            <path d="M-100 450 Q 200 400 500 470 T 1000 430 T 1600 460"
                stroke="#3b1f0a" stroke-width="1.5" fill="none" stroke-dasharray="6,10"/>
            <path d="M-100 680 Q 400 620 700 670 T 1300 650 T 1600 680"
                stroke="#3b1f0a" stroke-width="1" fill="none" stroke-dasharray="8,12"/>
            <path d="M 300 -50 Q 350 300 320 600 T 360 950"
                stroke="#3b1f0a" stroke-width="1" fill="none" stroke-dasharray="5,9"/>
            <path d="M 900 -50 Q 950 250 920 550 T 880 950"
                stroke="#3b1f0a" stroke-width="1" fill="none" stroke-dasharray="5,9"/>
            <circle cx="120" cy="200" r="4" fill="#3b1f0a" opacity="0.5"/>
            <circle cx="480" cy="250" r="4" fill="#3b1f0a" opacity="0.5"/>
            <circle cx="850" cy="210" r="4" fill="#3b1f0a" opacity="0.5"/>
            <circle cx="1150" cy="230" r="4" fill="#3b1f0a" opacity="0.5"/>
        </svg>

        <svg class="compass-rose" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="55" fill="none" stroke="#2c1508" stroke-width="1"/>
            <circle cx="60" cy="60" r="48" fill="none" stroke="#2c1508" stroke-width="0.5"/>
            <polygon points="60,4 65,56 60,60 55,56"  fill="#2c1508"/>
            <polygon points="60,116 65,64 60,60 55,64" fill="#2c1508" opacity="0.5"/>
            <polygon points="4,60 56,55 60,60 56,65"  fill="#2c1508" opacity="0.5"/>
            <polygon points="116,60 64,55 60,60 64,65" fill="#2c1508" opacity="0.5"/>
            <polygon points="60,15 64,57 60,60 56,57"  fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
            <polygon points="60,105 64,63 60,60 56,63" fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
            <polygon points="15,60 57,56 60,60 57,64"  fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
            <polygon points="105,60 63,56 60,60 63,64" fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
            <circle cx="60" cy="60" r="8" fill="none" stroke="#2c1508" stroke-width="1.5"/>
            <circle cx="60" cy="60" r="3" fill="#2c1508"/>
            <text x="60" y="30"  text-anchor="middle" font-size="11" font-family="IM Fell English, serif" fill="#2c1508" font-weight="bold">N</text>
            <text x="60" y="98"  text-anchor="middle" font-size="9"  font-family="IM Fell English, serif" fill="#2c1508">S</text>
            <text x="18" y="64"  text-anchor="middle" font-size="9"  font-family="IM Fell English, serif" fill="#2c1508">W</text>
            <text x="102" y="64" text-anchor="middle" font-size="9"  font-family="IM Fell English, serif" fill="#2c1508">E</text>
        </svg>

        <div id="loadingContent">
            <h1>One Piece</h1>
            <h2>World Map</h2>
            <div id="loadingBar">
                <div id="loadingFill"></div>
            </div>
            <p id="loadingText">Setting sail...</p>
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <div id="searchContainer">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search for a location..."
            autoComplete="off"
        />
        <div id="searchDropdown" class="hidden"></div>
    </div>

    <div id="infoPanel" class="hidden">
        <button id="closePanel" onclick="hidePanel()">✕</button>
        <h2 id="panelName"></h2>
        <div class="panelRow">
            <span class="panelLabel">Region</span>
            <span id="panelSea"></span>
        </div>
        <div class="panelRow">
            <span class="panelLabel">Type</span>
            <span id="panelType"></span>
        </div>
        <div class="panelRow">
            <span class="panelLabel">Arc</span>
            <span id="panelArc"></span>
        </div>
        <p id="panelNotes"></p>
    </div>

    <script src="src/map.js"></script>  

</body>
</html>
