<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece 3D Map</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <link rel="stylesheet" href="src/map.css">

</head>
<body>

    <div id="cesiumContainer"></div>

    <div id="infoPanel" class="hidden">
        <button id="closePanel" onclick="hidePanel()">✕</button>
        <h2 id="panelName"></h2>
        <div class="panelRow">
            <span class="panelLabel">Region</span>
            <span id="panelSea"></span>
        </div>
        <div class="panelRow">
            <span class="panelLabel">Type</span>
            <span id="panelType"></span>
        </div>
        <div class="panelRow">
            <span class="panelLabel">Arc</span>
            <span id="panelArc"></span>
        </div>
        <p id="panelNotes"></p>
    </div>

    <script src="src/map.js"></script>  

</body>
</html>
