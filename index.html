<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece 3D Map</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="src/map.css">
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <div id="loadingScreen">
        <svg class="sea-route" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100 200 Q 300 150 600 250 T 1200 200 T 1600 220" stroke="#3b1f0a" stroke-width="2" fill="none" stroke-dasharray="10,8"/>
            <path d="M-100 450 Q 200 400 500 470 T 1000 430 T 1600 460" stroke="#3b1f0a" stroke-width="1.5" fill="none" stroke-dasharray="6,10"/>
            <path d="M-100 680 Q 400 620 700 670 T 1300 650 T 1600 680" stroke="#3b1f0a" stroke-width="1" fill="none" stroke-dasharray="8,12"/>
            <path d="M 300 -50 Q 350 300 320 600 T 360 950" stroke="#3b1f0a" stroke-width="1" fill="none" stroke-dasharray="5,9"/>
            <path d="M 900 -50 Q 950 250 920 550 T 880 950" stroke="#3b1f0a" stroke-width="1" fill="none" stroke-dasharray="5,9"/>
            <circle cx="120" cy="200" r="4" fill="#3b1f0a" opacity="0.5"/>
            <circle cx="480" cy="250" r="4" fill="#3b1f0a" opacity="0.5"/>
            <circle cx="850" cy="210" r="4" fill="#3b1f0a" opacity="0.5"/>
            <circle cx="1150" cy="230" r="4" fill="#3b1f0a" opacity="0.5"/>
        </svg>
        <div id="loadingUnit">
            <svg class="compass-rose" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="55" fill="none" stroke="#2c1508" stroke-width="1"/>
                <circle cx="60" cy="60" r="48" fill="none" stroke="#2c1508" stroke-width="0.5"/>
                <polygon points="60,4 65,56 60,60 55,56"   fill="#2c1508"/>
                <polygon points="60,116 65,64 60,60 55,64"  fill="#2c1508" opacity="0.5"/>
                <polygon points="4,60 56,55 60,60 56,65"   fill="#2c1508" opacity="0.5"/>
                <polygon points="116,60 64,55 60,60 64,65"  fill="#2c1508" opacity="0.5"/>
                <polygon points="60,15 64,57 60,60 56,57"   fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
                <polygon points="60,105 64,63 60,60 56,63"  fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
                <polygon points="15,60 57,56 60,60 57,64"   fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
                <polygon points="105,60 63,56 60,60 63,64"  fill="#2c1508" opacity="0.4" transform="rotate(45 60 60)"/>
                <circle cx="60" cy="60" r="8" fill="none" stroke="#2c1508" stroke-width="1.5"/>
                <circle cx="60" cy="60" r="3" fill="#2c1508"/>
                <text x="60" y="30"  text-anchor="middle" font-size="11" font-family="IM Fell English, serif" fill="#2c1508" font-weight="bold">N</text>
                <text x="60" y="98"  text-anchor="middle" font-size="9"  font-family="IM Fell English, serif" fill="#2c1508">S</text>
                <text x="18" y="64"  text-anchor="middle" font-size="9"  font-family="IM Fell English, serif" fill="#2c1508">W</text>
                <text x="102" y="64" text-anchor="middle" font-size="9"  font-family="IM Fell English, serif" fill="#2c1508">E</text>
            </svg>

            <div id="loadingContent">
                <h1>One Piece</h1>
                <h2>World Map</h2>
                <div id="loadingBar">
                    <div id="loadingFill"></div>
                </div>
                <p id="loadingText">Setting sail...</p>
            </div>
        </div>  
    </div>

    <div id="cesiumContainer"></div>

    <div id="searchContainer">
        <input
            type="text"
            id="searchInput"
            placeholder="Search for a location..."
            autocomplete="off"
        />
        <div id="searchDropdown" class="hidden"></div>
    </div>

    <div id="locationCounter">
        Showing <span id="counterCurrent">173</span> of <span id="counterTotal">173</span> locations
    </div>

    <div id="controlsLegend">
        <div id="controlsTitle">Controls</div>
        <div class="controlRow">
            <span class="controlLabel">Search</span>
            <span class="controlKey">/</span>
        </div>
        <div class="controlRow">
            <span class="controlLabel">Filters</span>
            <span class="controlKey">F</span>
        </div>
        <div class="controlRow">
            <span class="controlLabel">Route</span>
            <span class="controlKey">R</span>
        </div>
        <div class="controlRow">
            <span class="controlLabel">Close</span>
            <span class="controlKey">C</span>
        </div>
        <div class="controlRow">
            <span class="controlLabel">Hide UI</span>
            <span class="controlKey">H</span>
        </div>
        <div class="controlRow">
            <span class="controlLabel">Story Forward</span>
            <span class="controlKey">→</span>
        </div>
        <div class="controlRow">
            <span class="controlLabel">Story Back</span>
            <span class="controlKey">←</span>
        </div>
    </div>

    <div id="spoilerPanel">
        <div id="spoilerTitle">Story Progress</div>
        <div id="spoilerArc">Elbaf Arc</div>
        <input type="range" id="spoilerSlider" min="0" max="34" value="34" step="1">
    </div>

    <button id="routeToggle">⚓ Straw Hat Route</button>

    <div id="filterPanel">
        <button id="filterToggle">☰ Filters</button>
        <div id="filterContent" class="hidden">
            <div class="filterSection">
                <h3>Region</h3>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="East Blue" checked> East Blue</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="West Blue" checked> West Blue</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="North Blue" checked> North Blue</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="South Blue" checked> South Blue</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="Grand Line" checked> Grand Line</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="Red Line" checked> Red Line</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="Calm Belt" checked> Calm Belt</label>
                <label><input type="checkbox" class="filterCheck" data-group="sea" value="New World" checked> New World</label>
            </div>
            <div class="filterSection">
                <h3>Type</h3>
                <label><input type="checkbox" class="filterCheck" data-group="type" value="Island" checked> Island</label>
                <label><input type="checkbox" class="filterCheck" data-group="type" value="Kingdom" checked> Kingdom</label>
                <label><input type="checkbox" class="filterCheck" data-group="type" value="Marine Base" checked> Marine Base</label>
                <label><input type="checkbox" class="filterCheck" data-group="type" value="Other" checked> Other</label>
                <label><input type="checkbox" class="filterCheck" data-group="type" value="Town" checked> Town</label>
                <label><input type="checkbox" class="filterCheck" data-group="type" value="Archipelago" checked> Archipelago</label>
            </div>
            <div class="filterSection">
                <h3>Arc</h3>
                <label><input type="checkbox" class="filterCheck" data-group="arc" value="canon" checked> Canon</label>
                <label><input type="checkbox" class="filterCheck" data-group="arc" value="filler" checked> Filler</label>
            </div>
            <div class="filterActions">
                <button class="filterActionBtn" id="selectAllBtn">Select All</button>
                <button class="filterActionBtn" id="deselectAllBtn">Deselect All</button>
            </div>
        </div>
    </div>

    <div id="infoPanel">
        <button id="closePanel" onclick="hidePanel()">✕</button>
        <h2 id="panelName"></h2>
        <div class="panelRow">
            <span class="panelLabel">Region</span>
            <span id="panelSea"></span>
        </div>
        <div class="panelRow">
            <span class="panelLabel">Type</span>
            <span id="panelType"></span>
        </div>
        <div class="panelRow">
            <span class="panelLabel">Arc</span>
            <span id="panelArc"></span>
        </div>
        <p id="panelNotes"></p>
    </div>

    <button id="mobileMenuBtn">☰</button>

    <div id="mobileDrawer" class="hidden">
        <div id="drawerHeader">
            <span>One Piece Map</span>
            <button id="drawerClose">✕</button>
        </div>
        <div id="drawerSearch">
            <input
                type="text"
                id="mobileSearchInput"
                placeholder="Search for a location..."
                autocomplete="off"
            />
            <div id="mobileSearchDropdown" class="hidden"></div>
        </div>
        <div id="drawerFilters">
            <h3>Region</h3>
            <div class="drawerFilterGroup">
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="East Blue" checked> East Blue</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="West Blue" checked> West Blue</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="North Blue" checked> North Blue</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="South Blue" checked> South Blue</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="Grand Line" checked> Grand Line</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="Red Line" checked> Red Line</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="Calm Belt" checked> Calm Belt</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="sea" value="New World" checked> New World</label>
            </div>
            <h3>Type</h3>
            <div class="drawerFilterGroup">
                <label><input type="checkbox" class="mobileFilterCheck" data-group="type" value="Island" checked> Island</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="type" value="Kingdom" checked> Kingdom</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="type" value="Marine Base" checked> Marine Base</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="type" value="Other" checked> Other</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="type" value="Town" checked> Town</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="type" value="Archipelago" checked> Archipelago</label>
            </div>
            <h3>Arc</h3>
            <div class="drawerFilterGroup">
                <label><input type="checkbox" class="mobileFilterCheck" data-group="arc" value="canon" checked> Canon</label>
                <label><input type="checkbox" class="mobileFilterCheck" data-group="arc" value="filler" checked> Filler</label>
            </div>
        </div>
        <div id="drawerRoute">
            <button id="mobileRouteToggle">⚓ Straw Hat Route</button>
        </div>
        <div id="drawerSpoiler">
            <h3>Story Progress</h3>
            <div id="mobileSpoilerArc">Elbaf Arc</div>
            <input type="range" id="mobileSpoilerSlider" min="0" max="34" value="34" step="1">
        </div>
    </div>

    <script src="src/map.js"></script>
    <script type="module">
        // Import and initialize Vercel Speed Insights
        import { injectSpeedInsights } from 'https://esm.sh/@vercel/speed-insights@2.0.0';
        
        // Initialize Speed Insights with default configuration
        injectSpeedInsights({
            debug: false
        });
    </script>

</body>
</html>
